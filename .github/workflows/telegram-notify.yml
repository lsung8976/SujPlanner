name: SujPlanner Smart Nudge

on:
  schedule:
    # KST 05:40 = UTC 20:40 (previous day) - Wake Up Call
    - cron: '40 20 * * *'
    # KST 12:30 = UTC 03:30 - Lunch Checkpoint
    - cron: '30 3 * * *'
    # KST 23:00 = UTC 14:00 - Bedtime Checkpoint
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type (wake/lunch/night)'
        required: false
        default: 'wake'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@12

      - name: Smart Nudge
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          INPUT_TYPE: ${{ github.event.inputs.type }}
        run: node scripts/telegram-notify.js
